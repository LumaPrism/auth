name: "deploy::auth"

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lumaprism/auth

jobs:
  build:
    name: "build::docker"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - id: tag
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

  deploy:
    name: "deploy::development"
    needs: build
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: "deploy::ghcr-login"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u LumaPrism --password-stdin

      - name: "deploy::run"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/prism/deploy.sh auth "${{ needs.build.outputs.image_tag }}"
