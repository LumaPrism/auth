name: "deploy::auth"

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lumaprism/auth

jobs:
  build:
    name: "build::docker"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - id: tag
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -t ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}
          docker push ${{ env.IMAGE }}:latest
