name: "deploy::auth"

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lumaprism/auth

jobs:
  build:
    name: "build::docker"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - id: tag
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

  deploy:
    name: "deploy::coolify::development"
    needs: build
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: "deploy::update-image"
        run: |
          COMPOSE=$(curl -fsSL "${{ secrets.COOLIFY_URL }}/api/v1/services/${{ secrets.COOLIFY_UUID_AUTH }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            | jq -r '.docker_compose_raw')
          UPDATED=$(echo "$COMPOSE" | sed "s|ghcr.io/lumaprism/auth:[^'\"[:space:]]*|ghcr.io/lumaprism/auth:${{ needs.build.outputs.image_tag }}|g")
          ENCODED=$(echo -n "$UPDATED" | base64 -w 0)
          PAYLOAD=$(jq -n --arg c "$ENCODED" '{"docker_compose_raw": $c}')
          curl -fsSL -X PATCH "${{ secrets.COOLIFY_URL }}/api/v1/services/${{ secrets.COOLIFY_UUID_AUTH }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: "deploy::auth"
        run: |
          curl -fsSL "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_UUID_AUTH }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
