name: "deploy::auth"

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lumaprism/auth
  INFRA_REPO: lumaprism/infrastructure
  KUST_PATH: k8s/overlays/development/kustomization.yaml

jobs:
  build:
    name: "build::docker"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - id: tag
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

  bump:
    name: "bump::infra"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: "checkout::infra"
        uses: actions/checkout@v5
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          path: infra

      - name: "install::yq"
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: "bump::tag"
        working-directory: infra
        env:
          NEW_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          set -euo pipefail
          OLD_TAG=$(yq '.images[] | select(.name == "ghcr.io/lumaprism/auth").newTag' "$KUST_PATH")
          if [ "$OLD_TAG" = "$NEW_TAG" ]; then
            echo "No tag change ($OLD_TAG == $NEW_TAG); skipping commit."
            exit 0
          fi

          yq -i "(.images[] | select(.name == \"ghcr.io/lumaprism/auth\")).newTag = \"${NEW_TAG}\"" "$KUST_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$KUST_PATH"
          git commit -m "deploy(auth): bump development to ${NEW_TAG}

          Source: ${{ github.repository }}@${{ github.sha }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin HEAD:main
