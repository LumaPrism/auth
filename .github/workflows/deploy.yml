name: "deploy::auth"

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lumaprism/auth

jobs:
  build:
    name: "build::docker"
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - id: tag
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha,scope=auth
          cache-to: type=gha,mode=max,scope=auth

  deploy:
    name: "deploy::coolify"
    needs: build
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: "deploy::auth"
        run: |
          curl -fsSL -X GET \
            "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_UUID_AUTH }}&tag=${{ needs.build.outputs.image_tag }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
